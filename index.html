<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRGdrinkGuy • School Energy Drinks</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: #0f0f0f;
            color: #eee;
        }
        h1 {
            color: #e60012;
            text-align: center;
            font-size: 2.5em;
        }
        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .form-section, .orders-section {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
            flex: 1;
            min-width: 300px;
        }
        label {
            display: block;
            margin: 15px 0 8px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #222;
            color: white;
        }
        button {
            background: #e60012;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 17px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #c4000f; }
        .order-item {
            background: #222;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 5px solid #e60012;
        }
        .done-btn {
            background: #28a745;
            margin-top: 8px;
        }
        .done-btn:hover { background: #218838; }
        #priceDisplay {
            font-size: 1.4em;
            color: #e60012;
            font-weight: bold;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <h1>NRGdrinkGuy • Energy Drink Orders</h1>
    <p style="text-align:center; color:#aaa;">Submit your requests — I'll bring them to school!</p>

    <div class="container">
        <!-- Order Form -->
        <div class="form-section">
            <h2>🧃 Order Monster Energy</h2>
            
            <label>Flavor:</label>
            <select id="flavor" required>
                <option value="">— Choose Flavor —</option>
                <option value="Ultra Paradise">Ultra Paradise</option>
                <option value="Mango Loco">Mango Loco</option>
                <option value="Pipeline Punch">Pipeline Punch</option>
                <option value="Original Green">Original Green</option>
                <option value="Zero Ultra">Zero Ultra</option>
                <option value="Raspberry">Raspberry</option>
                <option value="Watermelon">Watermelon</option>
                <option value="Pacific Punch">Pacific Punch</option>
                <option value="Khaos">Khaos</option>
                <option value="Assault">Assault</option>
            </select>

            <label>How many cans?</label>
            <input type="number" id="quantity" min="1" value="1" required>

            <p id="priceDisplay">Total: $3.00</p>

            <h2>🥤 Other Energy Drinks</h2>
            <label>Drink name (e.g. Red Bull, Celsius, Prime...)</label>
            <input type="text" id="otherDrink" placeholder="Red Bull Blue Edition 8.4oz">

            <label>Quantity</label>
            <input type="number" id="otherQty" min="1" value="1">

            <label>Notes / Max price you're okay paying</label>
            <textarea id="notes" rows="2" placeholder="e.g. Max $4 each"></textarea>

            <button onclick="submitOrder()">Submit Order</button>
        </div>

        <!-- Your Orders List (Admin View) -->
        <div class="orders-section">
            <h2>📋 Current Orders (For Wyatt)</h2>
            <p><strong>Total pending today:</strong> <span id="totalOrders">0</span></p>
            <div id="ordersList"></div>
            <button onclick="clearAllOrders()" style="background:#dc3545; margin-top:15px;">Clear All Orders</button>
        </div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('energyOrders')) || [];

        function updatePrice() {
            const qty = parseInt(document.getElementById('quantity').value) || 1;
            let total = 0;
            if (qty === 1) total = 3;
            else if (qty === 2) total = 5;
            else total = 3 + (qty - 1) * 2.5;
            document.getElementById('priceDisplay').textContent = `Total for Monsters: $${total.toFixed(2)}`;
        }

        function renderOrders() {
            const list = document.getElementById('ordersList');
            list.innerHTML = '';
            orders.forEach((order, index) => {
                const div = document.createElement('div');
                div.className = 'order-item';
                div.innerHTML = `
                    <strong>${order.flavor ? order.flavor + ' × ' + order.quantity : order.otherDrink + ' × ' + order.otherQty}</strong><br>
                    ${order.notes ? 'Notes: ' + order.notes + '<br>' : ''}
                    <small>${new Date(order.timestamp).toLocaleString()}</small><br>
                    <button class="done-btn" onclick="markDone(${index})">✅ Mark as Bought & Delivered</button>
                `;
                list.appendChild(div);
            });
            document.getElementById('totalOrders').textContent = orders.length;
        }

        function submitOrder() {
            const flavor = document.getElementById('flavor').value;
            const quantity = document.getElementById('quantity').value;
            const otherDrink = document.getElementById('otherDrink').value.trim();
            const otherQty = document.getElementById('otherQty').value;
            const notes = document.getElementById('notes').value.trim();

            if (!flavor && !otherDrink) {
                alert("Please choose a Monster flavor or enter another drink.");
                return;
            }

            const newOrder = {
                flavor: flavor,
                quantity: quantity,
                otherDrink: otherDrink,
                otherQty: otherQty,
                notes: notes,
                timestamp: Date.now()
            };

            orders.push(newOrder);
            localStorage.setItem('energyOrders', JSON.stringify(orders));

            alert("✅ Order added to your list!");
            renderOrders();

            // Clear the form
            document.getElementById('orderForm') ? document.getElementById('orderForm').reset() : null;
            document.getElementById('flavor').value = '';
            document.getElementById('otherDrink').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('quantity').value = 1;
            document.getElementById('otherQty').value = 1;
            updatePrice();
        }

        function markDone(index) {
            if (confirm("Mark this order as done?")) {
                orders.splice(index, 1);
                localStorage.setItem('energyOrders', JSON.stringify(orders));
                renderOrders();
            }
        }

        function clearAllOrders() {
            if (confirm("Clear ALL orders? This cannot be undone.")) {
                orders = [];
                localStorage.setItem('energyOrders', JSON.stringify(orders));
                renderOrders();
            }
        }

        // Initialize
        document.getElementById('quantity').addEventListener('input', updatePrice);
        updatePrice();
        renderOrders();
    </script>
</body>
</html>
