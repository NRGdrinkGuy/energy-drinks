<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRGdrinkGuy • Order</title>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    max-width: 800px;
    margin: 30px auto;
    padding: 20px;
    background: #0f0f0f;
    color: #eee;
}

h1 { text-align: center; color: #e60012; }

.container {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 12px;
}

label { display: block; margin: 12px 0 6px; font-weight: bold; }

input, select, textarea {
    width: 100%;
    padding: 12px;
    background: #222;
    border: 1px solid #444;
    color: white;
    border-radius: 6px;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 14px;
    background: #e60012;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover { background: #c4000f; }

#success {
    color: #28a745;
    margin-top: 10px;
    display: none;
}
</style>
</head>

<body>

<h1>🧃 Place Your Order</h1>

<div class="container">

<label>Name:</label>
<input id="name" maxlength="20">

<label>Monster Flavor:</label>
<select id="flavor">
    <option value="">None</option>
    <option>Ultra Paradise</option>
    <option>Mango Loco</option>
    <option>Pipeline Punch</option>
    <option>Original Green</option>
</select>

<label>Quantity:</label>
<input id="quantity" type="number" min="1" value="1">

<label>Other Drink:</label>
<input id="otherDrink" maxlength="30">

<label>Other Qty:</label>
<input id="otherQty" type="number" min="1" value="1">

<label>Notes:</label>
<textarea id="notes" maxlength="100"></textarea>

<button onclick="submitOrder()">Submit Order</button>

<div id="success">✅ Order placed!</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBfsnDlKJU_0SWbUi3e0zD02KmMz3h81cs",
    authDomain: "nrgdrinkguy.firebaseapp.com",
    projectId: "nrgdrinkguy"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function calculatePrice(qty) {
    return Math.floor(qty / 2) * 5 + (qty % 2) * 3;
}

window.submitOrder = async function () {

    const name = document.getElementById("name").value.trim() || "Anonymous";
    const flavor = document.getElementById("flavor").value;
    const quantity = parseInt(document.getElementById("quantity").value) || 1;

    const otherDrink = document.getElementById("otherDrink").value.trim();
    const otherQty = parseInt(document.getElementById("otherQty").value) || 1;

    const notes = document.getElementById("notes").value.trim();

    if (!flavor && !otherDrink) {
        alert("Select a drink");
        return;
    }

    const total = flavor ? calculatePrice(quantity) : null;

    await addDoc(collection(db, "orders"), {
        name,
        flavor: flavor || null,
        quantity: flavor ? quantity : null,
        total,
        otherDrink: otherDrink || null,
        otherQty: otherDrink ? otherQty : null,
        notes,
        timestamp: Date.now()
    });

    document.getElementById("success").style.display = "block";

    setTimeout(() => {
        document.getElementById("success").style.display = "none";
    }, 2000);

    document.getElementById("name").value = "";
    document.getElementById("flavor").value = "";
    document.getElementById("quantity").value = 1;
    document.getElementById("otherDrink").value = "";
    document.getElementById("otherQty").value = 1;
    document.getElementById("notes").value = "";
};
</script>

</body>
</html>
