<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NRGdrinkGuy • School Energy Drinks</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            background: #0f0f0f;
            color: #eee;
        }
        h1 {
            color: #e60012;
            text-align: center;
            font-size: 2.6em;
        }
        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .form-section, .orders-section {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
            flex: 1;
            min-width: 320px;
        }
        label {
            display: block;
            margin: 15px 0 8px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #222;
            color: white;
        }
        button {
            background: #e60012;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 17px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #c4000f; }
        .order-item {
            background: #222;
            padding: 15px;
            margin: 12px 0;
            border-radius: 8px;
            border-left: 5px solid #e60012;
        }
        .done-btn {
            background: #28a745;
            margin-top: 8px;
        }
        .done-btn:hover { background: #218838; }
        #priceDisplay {
            font-size: 1.4em;
            color: #e60012;
            font-weight: bold;
            margin: 15px 0;
        }
        .success { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <h1>NRGdrinkGuy • Energy Drink Orders</h1>
    <p style="text-align:center; color:#aaa;">Submit what you want — I'll buy and bring them to school!</p>

    <div class="container">
        <!-- Order Form -->
        <div class="form-section">
            <h2>🧃 Monster Energy</h2>
            
            <label>Flavor:</label>
            <select id="flavor">
                <option value="">— Choose Flavor —</option>
                <option value="Ultra Paradise">Ultra Paradise</option>
                <option value="Mango Loco">Mango Loco</option>
                <option value="Pipeline Punch">Pipeline Punch</option>
                <option value="Original Green">Original Green</option>
                <option value="Zero Ultra">Zero Ultra</option>
                <option value="Raspberry">Raspberry</option>
                <option value="Watermelon">Watermelon</option>
                <option value="Pacific Punch">Pacific Punch</option>
                <option value="Khaos">Khaos</option>
                <option value="Assault">Assault</option>
            </select>

            <label>How many cans?</label>
            <input type="number" id="quantity" min="1" value="1">

            <p id="priceDisplay">Total for Monsters: $3.00</p>

            <h2>🥤 Other Energy Drinks</h2>
            <label>Drink name (e.g. Red Bull 8.4oz, Celsius Vibe, Prime, etc.)</label>
            <input type="text" id="otherDrink" placeholder="Red Bull Blue Edition">

            <label>Quantity</label>
            <input type="number" id="otherQty" min="1" value="1">

            <label>Notes / Max price you're okay with</label>
            <textarea id="notes" rows="2" placeholder="e.g. Max $4 each or whatever"></textarea>

            <button onclick="submitOrder()">Submit This Order</button>
        </div>

        <!-- Your Private Orders List -->
        <div class="orders-section">
            <h2>📋 Current Orders (Only you can see this)</h2>
            <p><strong>Pending orders:</strong> <span id="totalOrders">0</span></p>
            <div id="ordersList"></div>
            
            <button onclick="clearAllOrders()" style="background:#dc3545; margin-top:20px;">
                Clear All Orders
            </button>
        </div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('energyOrders')) || [];

        function updatePrice() {
            const qty = parseInt(document.getElementById('quantity').value) || 1;
            let total = qty === 1 ? 3 : qty === 2 ? 5 : 3 + (qty - 1) * 2.5;
            document.getElementById('priceDisplay').textContent = `Total for Monsters: $${total.toFixed(2)}`;
        }

        function renderOrders() {
            const list = document.getElementById('ordersList');
            list.innerHTML = '';
            
            if (orders.length === 0) {
                list.innerHTML = '<p style="color:#888;">No orders yet...</p>';
                document.getElementById('totalOrders').textContent = 0;
                return;
            }

            orders.forEach((order, index) => {
                const div = document.createElement('div');
                div.className = 'order-item';
                
                let content = '';
                if (order.flavor) {
                    content += `<strong>Monster ${order.flavor} × ${order.quantity}</strong><br>`;
                }
                if (order.otherDrink) {
                    content += `<strong>${order.otherDrink} × ${order.otherQty}</strong><br>`;
                }
                if (order.notes) content += `Notes: ${order.notes}<br>`;
                
                div.innerHTML = `
                    ${content}
                    <small>${new Date(order.timestamp).toLocaleString()}</small><br>
                    <button class="done-btn" onclick="markDone(${index})">✅ Mark as Bought & Delivered</button>
                `;
                list.appendChild(div);
            });
            
            document.getElementById('totalOrders').textContent = orders.length;
        }

        window.submitOrder = function() {
            const flavor = document.getElementById('flavor').value.trim();
            const quantity = parseInt(document.getElementById('quantity').value) || 1;
            const otherDrink = document.getElementById('otherDrink').value.trim();
            const otherQty = parseInt(document.getElementById('otherQty').value) || 1;
            const notes = document.getElementById('notes').value.trim();

            // Only save if at least one thing is ordered
            if (!flavor && !otherDrink) {
                alert("Please select a Monster flavor or enter another energy drink.");
                return;
            }

            const newOrder = {
                flavor: flavor || null,
                quantity: flavor ? quantity : null,
                otherDrink: otherDrink || null,
                otherQty: otherDrink ? otherQty : null,
                notes: notes || null,
                timestamp: Date.now()
            };

            orders.push(newOrder);
            localStorage.setItem('energyOrders', JSON.stringify(orders));

            alert("✅ Order saved successfully!");
            renderOrders();

            // Clear form
            document.getElementById('flavor').value = '';
            document.getElementById('quantity').value = 1;
            document.getElementById('otherDrink').value = '';
            document.getElementById('otherQty').value = 1;
            document.getElementById('notes').value = '';
            updatePrice();
        };

        window.markDone = function(index) {
            if (confirm("Mark this order as done and remove it?")) {
                orders.splice(index, 1);
                localStorage.setItem('energyOrders', JSON.stringify(orders));
                renderOrders();
            }
        };

        window.clearAllOrders = function() {
            if (confirm("Delete ALL pending orders?")) {
                orders = [];
                localStorage.setItem('energyOrders', JSON.stringify(orders));
                renderOrders();
            }
        };

        // Initialize everything
        document.getElementById('quantity').addEventListener('input', updatePrice);
        updatePrice();
        renderOrders();
    </script>
</body>
</html>
